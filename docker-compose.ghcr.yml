services:
  cursor2api:
    image: ghcr.io/ddmww/cursor2api:latest
    container_name: cursor2api
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      # 将后台可写配置和日志统一落到 /app/data
      CONFIG_PATH: /app/data/config.yaml
      PORT: 3010
      TIMEOUT: 120
      # 公网部署时建议启用
      # AUTH_TOKEN: sk-your-secret-token-1,sk-your-secret-token-2
      # 启用后，/admin 日志页会将 JSONL 日志持久化到 /app/data/logs
      LOG_FILE_ENABLED: "true"
      LOG_DIR: /app/data/logs
      # 海外机器通常无需代理；国内环境按需取消注释
      # PROXY: http://host.docker.internal:7890
    volumes:
      - cursor2api_data:/app/data

volumes:
  cursor2api_data:
    name: cursor2api_data
